spring:
  application:
    name: url-shortner-be
  datasource:
    url: jdbc:postgresql://localhost:5431/urlshortner
    username: postgres
    password: postgres
  jpa:
    hibernate:
      ddl-auto: update
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    show-sql: true
    properties:
      hibernate:
        jdbc:
          time_zone: Asia/Kolkata
server:
  port: 8080
